name: 'devguard audit'
description: 'Audit your Node.js + React project — deps, env, and code quality in one command'
author: 'kevinpatildxd'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  command:
    description: 'Which command to run: deps, env, react, react:imports, react:hooks, react:bundle, react:a11y, react:server, react:secrets. Defaults to full audit.'
    required: false
    default: ''
  strict:
    description: 'Exit with code 1 if any errors are found (recommended for CI)'
    required: false
    default: 'true'
  json:
    description: 'Output results as JSON'
    required: false
    default: 'false'
  score:
    description: 'Print health score only (0-100), no detail output'
    required: false
    default: 'false'
  sarif:
    description: 'Write a SARIF report to devguard.sarif (for GitHub Code Scanning)'
    required: false
    default: 'false'
  licenses:
    description: 'Audit package licenses for copyleft and missing declarations (deps command)'
    required: false
    default: 'false'
  supply-chain:
    description: 'Check for install scripts, abandoned packages, and single-maintainer risk (deps command)'
    required: false
    default: 'false'
  duplicates:
    description: 'Detect packages installed at multiple versions (deps command)'
    required: false
    default: 'false'
  scan-git:
    description: 'Scan git history for accidentally committed .env files (env command)'
    required: false
    default: 'false'
  file:
    description: 'Path to a specific .env file (used with the env command)'
    required: false
    default: ''
  version:
    description: 'devguard version to use (e.g. 3.3.0). Defaults to latest.'
    required: false
    default: 'latest'
  timeout:
    description: 'Maximum seconds to wait for the audit to complete'
    required: false
    default: '300'
  working-directory:
    description: 'Working directory to run the audit in (useful for monorepos)'
    required: false
    default: ''

outputs:
  score:
    description: 'Project health score (0-100)'

runs:
  using: 'node20'
  main: 'dist/index.js'
